name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v0.4.0). If omitted, the version from Cargo.toml will be used.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | grep '^version' | cut -d '"' -f 2)
            if [ -n "$VERSION" ]; then
              echo "name=v$VERSION" >> $GITHUB_OUTPUT
            else
              echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.tag.outputs.name }} --strip header

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Hematite CLI
        run: cargo build --release --bin hematite-cli

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp target/release/hematite-cli.exe release/
          cd release
          7z a -tzip hematite-cli-windows-x64.zip hematite-cli.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: 'Hematite ${{ steps.tag.outputs.name }}'
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
          files: |
            release/hematite-cli.exe
            release/hematite-cli-windows-x64.zip
